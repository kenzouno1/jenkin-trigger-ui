services:
  frontend:
    build: .
    ports:
      - "3003:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/data.db
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  backend-data:
